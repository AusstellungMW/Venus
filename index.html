<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Bellerophon auf Pegasus</title>

<style>

html, body {
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
font-family: Arial, Helvetica, sans-serif;
}

video {
width:100vw;
height:100vh;
object-fit:contain;
background:black;
display:block;
}

#overlay {
position:fixed;
inset:0;
background-image:url("Start.png");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
z-index:10;
cursor:pointer;
}

#title {
color:black;
font-size:9vw;
margin-top:40px;
text-align:center;
text-shadow:0 0 10px rgba(255,255,255,0.6);
}

#hint {
position:absolute;
bottom:60px;
color:black;
font-size:9vw;
text-shadow:0 0 10px rgba(255,255,255,0.6);
}

</style>

</head>

<body>

<div id="overlay">

<div id="title">
Triumph der Venus
</div>

<div id="hint">
Zum Start tippen
</div>

</div>

<video id="player" loop playsinline preload="auto">

<source src="result_video_fast.mp4" type="video/mp4">

</video>

<script>

const video = document.getElementById("player");
const overlay = document.getElementById("overlay");

overlay.addEventListener("click", async () => {

try {

video.muted = false;
video.volume = 1;

await video.play();

overlay.style.display = "none";

}

catch(err) {

console.log(err);

}

});

</script>

</body>
</html>
